name: daily activity

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      pick_count:
        description: 'how many other repos to touch'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  self-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: update readme
        run: python3 .github/scripts/update_readme.py

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md activity.log
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: daily update"
          git push

  multi-repo:
    runs-on: ubuntu-latest
    needs: self-update
    steps:
      - uses: actions/checkout@v4
      - name: touch other repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USER: ${{ github.repository_owner }}
          PICK_COUNT: ${{ github.event.inputs.pick_count || '2' }}
        run: python3 .github/scripts/multi_repo.py
